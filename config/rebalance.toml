[rebalance]
# Keep all categories in the live pool, including experimental mentions.
exclude_categories = []

# Keep scoring/reports across all categories, but only run new BUYs for the
# strongest N categories in the live universe. 0 means no cap.
max_live_categories = 3

# incumbent stays if still competitive
incumbent_max_rank = 2
hold_gap_abs = 4.0
hold_gap_rel = 0.05

# challenger must win repeatedly before replacement
confirmation_cycles = 2

[lifecycle]
exit_grace_days = 14
